  /api/admin/vacancies/candidates/overview:
    $ref: './paths/admin-vacancies-candidates.yaml#/~1api~1admin~1vacancies~1candidates~1overview'
  /api/admin/vacancies/candidates/{submissionId}:
    $ref: './paths/admin-vacancies-candidates.yaml#/~1api~1admin~1vacancies~1candidates~1{submissionId}'
  /api/admin/vacancies/candidates/status:
    $ref: './paths/admin-vacancies-candidates.yaml#/~1api~1admin~1vacancies~1candidates~1status'
  /api/admin/vacancies/candidates/comment:
    $ref: './paths/admin-vacancies-candidates.yaml#/~1api~1admin~1vacancies~1candidates~1comment'
  /api/admin/vacancies/candidates/delete:
    $ref: './paths/admin-vacancies-candidates.yaml#/~1api~1admin~1vacancies~1candidates~1delete'

  /api/admin/submissions/vacancies:
    $ref: './paths/admin-submissions-vacancies.yaml#/~1api~1admin~1submissions~1vacancies'
  /api/admin/submissions/vacancies/overview:
    $ref: './paths/admin-submissions-vacancies.yaml#/~1api~1admin~1submissions~1vacancies~1overview'
  /api/admin/submissions/vacancies/{submissionId}:
    $ref: './paths/admin-submissions-vacancies.yaml#/~1api~1admin~1submissions~1vacancies~1{submissionId}'
  /api/admin/submissions/vacancies/status:
    $ref: './paths/admin-submissions-vacancies.yaml#/~1api~1admin~1submissions~1vacancies~1status'
  /api/admin/submissions/vacancies/comment:
    $ref: './paths/admin-submissions-vacancies.yaml#/~1api~1admin~1submissions~1vacancies~1comment'
  /api/admin/submissions/vacancies/delete:
    $ref: './paths/admin-submissions-vacancies.yaml#/~1api~1admin~1submissions~1vacancies~1delete'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SubmissionIdPath:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
    SubmissionIdQuery:
      name: submissionId
      in: query
      required: true
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit20:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 20
    DateFrom:
      name: dateFrom
      in: query
      schema:
        type: string
        format: date
    DateTo:
      name: dateTo
      in: query
      schema:
        type: string
        format: date
    StatusModeration:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/ModerationStatus'
    Period:
      name: period
      in: query
      schema:
        type: string
        enum: [week, month, year]
        default: week

  responses:
    Unauthorized:
      description: Missing or invalid token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but lacks permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadRequest:
      description: Validation or request format error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    ModerationStatus:
      type: string
      enum: [new, viewed, processed, rejected, deferred]

    UploadInitRequest:
      type: object
      required: [formType, file]
      properties:
        formType:
          type: string
          enum: [project, vacancy]
        file:
          $ref: '#/components/schemas/FileMetaInput'

    UploadInitResponse:
      type: object
      required: [uploadUrl, path, method, expiresAt, headers]
      properties:
        uploadUrl:
          type: string
          format: uri
        path:
          type: string
        method:
          type: string
          const: PUT
        expiresAt:
          type: string
          format: date-time
        headers:
          type: object
          properties:
            Content-Type:
              type: string

    FileMetaInput:
      type: object
      required: [path, originalName, mimeType, sizeBytes]
      properties:
        path:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
          minimum: 1

    SiteContextInput:
      type: object
      properties:
        siteId:
          type: string
          description: |
            Optional explicit site identifier for cross-site ingestion.
            `echocode_app` is used for the external static app site.
          example: echocode_app
        siteHost:
          type: string
          description: Canonical host of the originating site.
          example: echocode.app

    PageViewTrackRequest:
      allOf:
        - $ref: '#/components/schemas/SiteContextInput'
        - type: object
          required: [path, url]
          properties:
            path:
              type: string
            url:
              type: string
            title:
              type: [string, 'null']
            referrer:
              type: [string, 'null']
            source:
              type: string
              example: echocode_app

    LegacyProjectSubmissionRequest:
      allOf:
        - $ref: '#/components/schemas/SiteContextInput'
        - type: object
          additionalProperties: true
          description: |
            Legacy project submission payload. The backend still accepts the existing flexible body,
            but cross-site integrations should send `siteId` and `siteHost` explicitly.

    ClientProjectCreateRequest:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email:
          type: string
          format: email
        description: { type: string }
        image:
          $ref: '#/components/schemas/FileMetaInput'

    EmailSubmissionCreateRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        source:
          type: string

    VacancySnapshotInput:
      type: object
      required: [vacancyId]
      properties:
        vacancyId: { type: string }
        vacancySlug: { type: string }
        vacancyTitle: { type: string }
        level: { type: string }
        conditions:
          type: array
          items: { type: string }
        employmentType: { type: string }

    VacancySubmissionCreateRequest:
      type: object
      required: [profileUrl, cvFile, vacancy]
      properties:
        profileUrl:
          type: string
          format: uri
        cvFile:
          $ref: '#/components/schemas/FileMetaInput'
        vacancy:
          $ref: '#/components/schemas/VacancySnapshotInput'

    CreateEntityResponse:
      type: object
      required: [id, status, createdAt]
      properties:
        id: { type: string }
        status:
          $ref: '#/components/schemas/ModerationStatus'
        createdAt:
          type: string
          format: date-time

    UpdateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/ModerationStatus'

    UpdateStatusResponse:
      type: object
      required: [id, status, updatedAt, reviewedBy, reviewedAt]
      properties:
        id: { type: string }
        status:
          $ref: '#/components/schemas/ModerationStatus'
        updatedAt:
          type: string
          format: date-time
        reviewedBy:
          type: [string, 'null']
        reviewedAt:
          type: [string, 'null']
          format: date-time

    AddCommentRequest:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
          minLength: 1
          maxLength: 1200

    GenericCommentResponse:
      type: object
      required: [id, comment, updatedAt]
      properties:
        id: { type: string }
        comment:
          type: object
          required: [id, text, authorUid, authorEmail, createdAt]
          properties:
            id: { type: string }
            text: { type: string }
            authorUid: { type: string }
            authorEmail: { type: [string, 'null'] }
            createdAt:
              type: string
              format: date-time
        updatedAt:
          type: string
          format: date-time

    SoftDeleteResponse:
      type: object
      required: [id, isDeleted, updatedAt]
      properties:
        id: { type: string }
        isDeleted:
          type: boolean
          const: true
        updatedAt:
          type: string
          format: date-time

    GenericListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [items, page]
              properties:
                items:
                  type: array
                  items:
                    type: object
                page:
                  type: object
                  required: [limit, nextCursor, hasNextPage]
                  properties:
                    limit: { type: integer }
                    nextCursor: { type: [string, 'null'] }
                    hasNextPage: { type: boolean }

    GenericOverviewEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object

    GenericDetailsEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [item]
              properties:
                item:
                  type: object

    UpdateStatusEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UpdateStatusResponse'

    AddCommentEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/GenericCommentResponse'

    SoftDeleteEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SoftDeleteResponse'

    CreateEntityEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CreateEntityResponse'

    UploadInitEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UploadInitResponse'
