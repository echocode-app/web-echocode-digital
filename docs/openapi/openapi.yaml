  /api/admin/vacancies/{vacancyId}:
    $ref: './paths/admin-vacancies.yaml#/~1api~1admin~1vacancies~1{vacancyId}'
  /api/admin/portfolio:
    $ref: './paths/admin-portfolio.yaml#/~1api~1admin~1portfolio'
  /api/admin/portfolio/image/init:
    $ref: './paths/admin-portfolio.yaml#/~1api~1admin~1portfolio~1image~1init'
