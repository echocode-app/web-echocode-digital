openapi: 3.1.0
info:
  title: Echocode API
  version: 1.1.0
  description: |
    Canonical backend API contract for public form submissions and admin moderation/dashboard endpoints.
    Response envelope format:
    - success: `{ "success": true, "data": ... }`
    - error: `{ "success": false, "error": { "code", "message" } }`
  license:
    name: Proprietary
    identifier: Proprietary
servers:
  - url: https://api.echocode.digital
  - url: http://127.0.0.1:3000
tags:
  - name: System
    description: Health and internal infrastructure checks.
  - name: Public Forms
    description: Public endpoints for form submit flows.
  - name: Admin Core
    description: Authenticated admin account and audit endpoints.
  - name: Admin Dashboard
    description: Dashboard and geography analytics.
  - name: Admin Echocode App
    description: Dedicated analytics and legacy submissions slice for the external echocode.app site.
  - name: Admin Submissions Legacy
    description: Legacy submissions moderation endpoints.
  - name: Admin Client Submissions
    description: Client project moderation queue.
  - name: Admin Email Submissions
    description: Footer email moderation queue.
  - name: Admin Vacancy Candidates
    description: Canonical vacancy candidates moderation queue.
  - name: Admin Vacancies
    description: Manage public vacancy visibility and metadata.
  - name: Admin Vacancy Submissions
    description: Legacy compatibility alias for vacancy candidates queue.
security:
  - bearerAuth: []
paths:
  /api/health:
    $ref: './paths/system.yaml#/~1api~1health'
  /api/internal/firebase-check:
    $ref: './paths/system.yaml#/~1api~1internal~1firebase-check'

  /api/analytics/page-view:
    $ref: './paths/public-forms.yaml#/~1api~1analytics~1page-view'
  /api/forms/uploads/init:
    $ref: './paths/public-forms.yaml#/~1api~1forms~1uploads~1init'
  /api/forms/submissions:
    $ref: './paths/public-forms.yaml#/~1api~1forms~1submissions'
  /api/forms/client-project:
    $ref: './paths/public-forms.yaml#/~1api~1forms~1client-project'
  /api/forms/client-project/image/init:
    $ref: './paths/public-forms.yaml#/~1api~1forms~1client-project~1image~1init'
  /api/forms/client-project/analytics:
    $ref: './paths/public-forms.yaml#/~1api~1forms~1client-project~1analytics'
  /api/forms/email-submissions:
    $ref: './paths/public-forms.yaml#/~1api~1forms~1email-submissions'
  /api/forms/vacancy-submissions:
    $ref: './paths/public-forms.yaml#/~1api~1forms~1vacancy-submissions'

  /api/admin/me:
    $ref: './paths/admin-core.yaml#/~1api~1admin~1me'
  /api/admin/logs:
    $ref: './paths/admin-core.yaml#/~1api~1admin~1logs'

  /api/admin/dashboard/overview:
    $ref: './paths/admin-dashboard.yaml#/~1api~1admin~1dashboard~1overview'
  /api/admin/dashboard/geography:
    $ref: './paths/admin-dashboard.yaml#/~1api~1admin~1dashboard~1geography'
  /api/admin/echocode-app/overview:
    $ref: './paths/admin-echocode-app.yaml#/~1api~1admin~1echocode-app~1overview'
  /api/admin/echocode-app/submissions:
    $ref: './paths/admin-echocode-app.yaml#/~1api~1admin~1echocode-app~1submissions'

  /api/admin/submissions:
    $ref: './paths/admin-submissions-legacy.yaml#/~1api~1admin~1submissions'
  /api/admin/submissions/status:
    $ref: './paths/admin-submissions-legacy.yaml#/~1api~1admin~1submissions~1status'
  /api/admin/submissions/overview:
    $ref: './paths/admin-submissions-legacy.yaml#/~1api~1admin~1submissions~1overview'

  /api/admin/submissions/clients:
    $ref: './paths/admin-submissions-clients.yaml#/~1api~1admin~1submissions~1clients'
  /api/admin/submissions/clients/overview:
    $ref: './paths/admin-submissions-clients.yaml#/~1api~1admin~1submissions~1clients~1overview'
  /api/admin/submissions/clients/{submissionId}:
    $ref: './paths/admin-submissions-clients.yaml#/~1api~1admin~1submissions~1clients~1{submissionId}'
  /api/admin/submissions/clients/status:
    $ref: './paths/admin-submissions-clients.yaml#/~1api~1admin~1submissions~1clients~1status'
  /api/admin/submissions/clients/comment:
    $ref: './paths/admin-submissions-clients.yaml#/~1api~1admin~1submissions~1clients~1comment'
  /api/admin/submissions/clients/delete:
    $ref: './paths/admin-submissions-clients.yaml#/~1api~1admin~1submissions~1clients~1delete'

  /api/admin/submissions/emails:
    $ref: './paths/admin-submissions-emails.yaml#/~1api~1admin~1submissions~1emails'
  /api/admin/submissions/emails/overview:
    $ref: './paths/admin-submissions-emails.yaml#/~1api~1admin~1submissions~1emails~1overview'
  /api/admin/submissions/emails/{submissionId}:
    $ref: './paths/admin-submissions-emails.yaml#/~1api~1admin~1submissions~1emails~1{submissionId}'
  /api/admin/submissions/emails/status:
    $ref: './paths/admin-submissions-emails.yaml#/~1api~1admin~1submissions~1emails~1status'
  /api/admin/submissions/emails/comment:
    $ref: './paths/admin-submissions-emails.yaml#/~1api~1admin~1submissions~1emails~1comment'
  /api/admin/submissions/emails/delete:
