/api/analytics/page-view:
  post:
    tags: [Public Forms]
    operationId: trackPageView
    summary: Track public page view event
    description: |
      Best-effort page view analytics endpoint used by the public site.
      Country is resolved on the server from proxy headers (for example Vercel or Cloudflare).
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/PageViewTrackRequest'
    responses:
      '200':
        description: Event accepted
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SuccessEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
    x-notes:
      - Supports approved cross-origin browser calls from external frontend sites.
      - The backend resolves country from proxy headers and persists site-aware metadata.

/api/forms/uploads/init:
  post:
    tags: [Public Forms]
    operationId: initFormUpload
    summary: Issue signed upload URL for project/vacancy file
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/UploadInitRequest'
    responses:
      '200':
        description: Signed upload URL
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UploadInitEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

/api/forms/submissions:
  post:
    tags: [Public Forms]
    operationId: createLegacyProjectSubmission
    summary: Create legacy submissions entry
    description: Legacy endpoint for project submissions flow.
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/LegacyProjectSubmissionRequest'
    responses:
      '200':
        description: Submission created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateEntityEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
    x-notes:
      - Supports approved cross-origin browser calls from external frontend sites.
      - Cross-site integrations should send `siteId` and `siteHost` explicitly.

