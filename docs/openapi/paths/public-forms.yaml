/api/forms/uploads/init:
  post:
    tags: [Public Forms]
    operationId: initFormUpload
    summary: Issue signed upload URL for project/vacancy file
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/UploadInitRequest'
    responses:
      '200':
        description: Signed upload URL
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UploadInitEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

/api/forms/submissions:
  post:
    tags: [Public Forms]
    operationId: createLegacyProjectSubmission
    summary: Create legacy submissions entry
    description: Legacy endpoint for project submissions flow.
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      '200':
        description: Submission created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateEntityEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

/api/forms/client-project:
  post:
    tags: [Public Forms]
    operationId: createClientProjectSubmission
    summary: Create client project submission
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/ClientProjectCreateRequest'
    responses:
      '200':
        description: Created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateEntityEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

/api/forms/client-project/image/init:
  post:
    tags: [Public Forms]
    operationId: initClientProjectImageUpload
    summary: Issue signed upload URL for client project image
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [file]
            properties:
              file:
                $ref: '../openapi.yaml#/components/schemas/FileMetaInput'
    responses:
      '200':
        description: Upload URL issued
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UploadInitEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

/api/forms/client-project/analytics:
  post:
    tags: [Public Forms]
    operationId: trackClientProjectAnalyticsEvent
    summary: Track client project modal analytics event
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [eventType]
            properties:
              eventType:
                type: string
                enum: [contact_modal_open, submit_project_attempt, submit_project_error]
              metadata:
                type: object
                additionalProperties: true
    responses:
      '200':
        description: Event accepted
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SuccessEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

/api/forms/email-submissions:
  post:
    tags: [Public Forms]
    operationId: createEmailSubmission
    summary: Create email-only submission (footer)
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/EmailSubmissionCreateRequest'
    responses:
      '200':
        description: Created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateEntityEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

/api/forms/vacancy-submissions:
  post:
    tags: [Public Forms]
    operationId: createVacancySubmission
    summary: Create vacancy submission (CV + profile URL)
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/VacancySubmissionCreateRequest'
    responses:
      '200':
        description: Created
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateEntityEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
