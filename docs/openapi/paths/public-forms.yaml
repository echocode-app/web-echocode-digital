/api/forms/client-project/image/init:
  post:
    tags: [Public Forms]
    operationId: initClientProjectImageUpload
    summary: Issue signed upload URL for client project image
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [file]
            properties:
              file:
                $ref: '../openapi.yaml#/components/schemas/FileMetaInput'
    responses:
      '200':
        description: Upload URL issued
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UploadInitEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

/api/forms/client-project/analytics:
  post:
    tags: [Public Forms]
    operationId: trackClientProjectAnalyticsEvent
    summary: Track client project modal analytics event
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [eventType]
            properties:
              eventType:
                type: string
                enum:
                  - contact_modal_open
                  - contact_modal_close
                  - contact_modal_cta_click
                  - submit_project_attempt
                  - submit_project_error
              metadata:
                type: object
                additionalProperties: true
    responses:
      '200':
        description: Event accepted
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SuccessEnvelope'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'

